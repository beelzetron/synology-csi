# Builds the CSI driver image on pull requests and pushes to GHCR when the PR
# branch lives in this repository (same-repo PRs). Fork PRs still build locally
# but cannot push with the default GITHUB_TOKEN.

name: PR container build

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: read
  packages: write

concurrency:
  group: pr-docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine if we can push to GHCR
        id: publish
        run: |
          HEAD="${{ github.event.pull_request.head.repo.full_name }}"
          BASE="${{ github.repository }}"
          if [ "$HEAD" = "$BASE" ]; then
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Fork PR — image is built but not pushed (GITHUB_TOKEN cannot write packages for fork workflows)."
          fi

      - name: Log in to GHCR
        if: steps.publish.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (GHCR tags)
        id: meta
        if: steps.publish.outputs.can_push == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
            type=sha,prefix=pr-${{ github.event.pull_request.number }}-

      - name: Build (and push to GHCR if same-repo PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ steps.publish.outputs.can_push == 'true' }}
          load: ${{ steps.publish.outputs.can_push != 'true' }}
          tags: ${{ steps.meta.outputs.tags || format('synology-csi:pr-{0}', github.event.pull_request.number) }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-check (local image)
        if: steps.publish.outputs.can_push != 'true'
        run: |
          docker run --rm --entrypoint /bin/sh \
            synology-csi:pr-${{ github.event.pull_request.number }} \
            -c 'test -x /synology-csi-driver && ls -la /synology-csi-driver'

      - name: Smoke-check (pulled from GHCR)
        if: steps.publish.outputs.can_push == 'true'
        run: |
          docker pull "ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}"
          docker run --rm --entrypoint /bin/sh \
            "ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}" \
            -c 'test -x /synology-csi-driver && ls -la /synology-csi-driver'

      - name: Add image pull hint to summary
        if: steps.publish.outputs.can_push == 'true'
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          short="${HEAD_SHA:0:7}"
          {
            echo "### GHCR image (this PR)"
            echo "Floating tag (latest build for PR #${PR}):"
            echo '```'
            echo "docker pull ${IMAGE}:pr-${PR}"
            echo '```'
            echo "Immutable tag (matches docker/metadata \`type=sha\` short digest):"
            echo '```'
            echo "docker pull ${IMAGE}:pr-${PR}-${short}"
            echo '```'
            echo "Private repos: \`docker login ghcr.io\` with a PAT that has \`read:packages\`."
          } >> "$GITHUB_STEP_SUMMARY"
