name: CI
# pull_request: runs for PRs (including every push to the PR branch).
# push: only default branch and version tags — otherwise every commit on a PR
# branch would match both `push` and `pull_request` and CI would run twice.
on:
  pull_request:
    paths:
      - '.github/workflows/ci.yaml'
      - 'go.*'
      - '**/*.go'
      - 'Dockerfile'
      - 'Makefile'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/ci.yaml'
      - 'go.*'
      - '**/*.go'
      - 'Dockerfile'
      - 'Makefile'

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Set up Go
        uses: actions/setup-go@v6.1.0
        with:
          go-version-file: 'go.mod'

      - name: Build binary
        run: make build

      - name: Unit tests
        run: make test
