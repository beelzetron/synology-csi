# Build the CSI driver image and push to GitHub Container Registry (ghcr.io).
#
# GITHUB_TOKEN must be allowed to write packages for this repository (Settings →
# Actions → General → Workflow permissions: read and write, or enable
# fine-grained policy that grants packages: write). No extra secrets are needed
# for pushes to ghcr.io in the same repo namespace.

name: Container

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/container.yaml'
      - '.github/workflows/ci.yaml'
      - 'go.*'
      - '**/*.go'
      - 'Dockerfile'
      - 'Makefile'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
