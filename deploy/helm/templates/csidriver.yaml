{{- if $.Values.installCSIDriver }}
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  labels: {{- include "synology-csi.labels" $ | nindent 4 }}
  name: csi.san.synology.com
spec:
  attachRequired: false # ControllerPublishVolume is not implemented; attach must be skipped for correct volume lifecycle ordering
  podInfoOnMount: true
  volumeLifecycleModes:
    - Persistent
{{- end }}
